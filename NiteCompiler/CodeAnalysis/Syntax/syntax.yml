tokens:
  # None and EndOfFile is embedded in generator code
  - name: Tilde
    text: "~"
  - name: Exclamation
    text: "!"
  - name: Ampersand
    text: "&"
  - name: Bar
    text: "|"
  - name: Percent
    text: "%"
  - name: Caret
    text: "^"
  - name: Underscore
    text: "_"
  - name: OpenParen
    text: "("
  - name: CloseParen
    text: ")"
  - name: OpenBrace
    text: "{"
  - name: CloseBrace
    text: "}"
  - name: OpenBracket
    text: "["
  - name: CloseBracket
    text: "]"
  - name: Dot
    text: "."
  - name: Comma
    text: ","
  - name: Colon
    text: ":"
  - name: DoubleColon
    text: "::"
  - name: Semicolon
    text: ";"
  - name: Plus
    text: "+"
  - name: Minus
    text: "-"
  - name: Asterisk
    text: "*"
  - name: Slash
    text: "/"
  - name: Backslash
    text: "\\"
  - name: Less
    text: "<"
  - name: Greater
    text: ">"
  - name: Range
    text: ".."
  - name: InclusiveRange
    text: "..="
    # these 3 produced at the parser, not in the lexer
  - name: RightShift
    text: ">>"
  - name: UnsignedRightShift
    text: ">>>"
  - name: LeftShift
    text: "<<"
    
  # compound operators
  - name: PlusEquals
    text: "+="
  - name: MinusEquals
    text: "-="
  - name: AsteriskEquals
    text: "*="
  - name: SlashEquals
    text: "/="
  - name: PercentEquals
    text: "%="
    
  - name: DoubleEquals
    text: "=="
  - name: ExclamationMarkEquals
    text: "!="
  - name: LessEquals
    text: "<="
  - name: GreaterEquals
    text: ">="
    
  # keywords
  - name: TrueKeyword
    text: "true"
  - name: FalseKeyword
    text: "false"
    
  # type keywords
  - name: BoolKeyword
    text: bool
  - name: I8Keyword
    text: i8
  - name: I16Keyword
    text: i16
  - name: I32Keyword
    text: i32
  - name: I64Keyword
    text: i64
  - name: I128Keyword
    text: i128
  - name: U8Keyword
    text: u8
  - name: U16Keyword
    text: u16
  - name: U32Keyword
    text: u32
  - name: U64Keyword
    text: u64
  - name: U128Keyword
    text: u128
  - name: F16Keyword
    text: f16
  - name: F32Keyword
    text: f32
  - name: F64Keyword
    text: f64
    
  # trivia
  - name: EmptySpaceTrivia
  - name: NewLineTrivia
  - name: SingleLineComment
  - name: MultiLineComment
    
nodes:
  - name: SyntaxNode
    abstract: true
    members:
      - name: SyntaxTree
        type: SyntaxTree
        
  - name: Root
    base: SyntaxNode
    members:
      - name: Expressions
        type: [Expression]
    
  - name: Expression
    base: SyntaxNode
    abstract: true
    
  - name: UnaryExpression
    base: Expression
    members:
      - name: OperatorToken
        type: SyntaxToken
      - name: Value
        type: ExpressionSyntax
    kinds:
      - name: UnaryAdditionExpression
        precedence: Additive
      - name: UnarySubstractionExpression
        precedence: Additive

  - name: BinaryExpression
    base: Expression
    members:
      - name: Left
        type: ExpressionSyntax
      - name: OperatorToken
        type: SyntaxToken
      - name: Right
        type: ExpressionSyntax
    kinds:
      - name: AdditionExpression
        precedence: Additive
      - name: AdditionAssignmentExpression
        precedence: Assignment
        
      - name: SubstractionExpression
        precedence: Additive
      - name: SubstractionAssignmentExpression
        precedence: Assignment
        
      - name: MultiplicationExpression
        precedence: Multiplicative
      - name: MultiplicationAssignmentExpression
        precedence: Assignment
        
      - name: DivisionExpression
        precedence: Multiplicative
      - name: DivisionAssignmentExpression
        precedence: Assignment
        
      - name: ModuloExpression
        precedence: Multiplicative
      - name: ModuloAssignmentExpression
        precedence: Assignment 